name: Refresh data

# Refreshes the Yahoo + SEC snapshot into Upstash Redis on a schedule, independent
# of Vercel (no function time limit, and not subject to Hobby's once/day cron cap).
#
# Data sources are keyless, so no API key is needed — just the Upstash secrets to
# write the snapshot. Use the "Run workflow" button (workflow_dispatch) for extras.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN
#   (optional) SEC_USER_AGENT — your "name email" contact for SEC requests

on:
  schedule:
    - cron: "0 14 * * *" # 14:00 UTC daily
  workflow_dispatch: {}

# Avoid overlapping runs writing the snapshot at the same time.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run refresh:local
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
